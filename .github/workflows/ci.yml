name: CI (Build Check)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

jobs:
  android:
    name: SnapLink Android Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('front/android/**/*.gradle*', 'front/android/gradle-wrapper.properties') }}

      - name: Build Android Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: front/android/app/build/outputs/apk/debug/app-debug.apk

  ios:
    name: SnapLink iOS Build
    runs-on: macos-15
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: front

      - name: Install dependencies
        run: npm ci

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: front/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('front/ios/Podfile.lock') }}

      - name: Pod install
        run: cd ios && pod install

      - name: List Available Simulators
        run: xcrun simctl list devices available

      - name: Build iOS Simulator App
        run: |
          cd ios
          # Get first available iOS Simulator with its OS version
          SIMULATOR_INFO=$(xcrun simctl list devices available | grep "iPhone" | head -n 1)
          DEVICE_ID=$(echo "$SIMULATOR_INFO" | grep -o '[A-F0-9]\{8\}-[A-F0-9]\{4\}-[A-F0-9]\{4\}-[A-F0-9]\{4\}-[A-F0-9]\{12\}')
          OS_VERSION=$(echo "$SIMULATOR_INFO" | grep -o 'iOS [0-9.]*' | awk '{print $2}')

          echo "Using simulator ID: $DEVICE_ID with iOS $OS_VERSION"

          # Build for the specific simulator (no -sdk needed, will use runtime)
          xcodebuild \
            -workspace snaplink.xcworkspace \
            -scheme snaplink \
            -configuration Debug \
            -destination "id=$DEVICE_ID" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            build
