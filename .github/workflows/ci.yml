name: CI (Build Check)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

jobs:
  android:
    name: SnapLink Android Build
    runs-on: self-hosted
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('front/android/**/*.gradle*', 'front/android/gradle-wrapper.properties') }}

      - name: Build Android Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: front/android/app/build/outputs/apk/debug/app-debug.apk

  ios:
    name: SnapLink iOS Build
    if: github.event_name == 'push'
    runs-on: self-hosted
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: front

      - name: Cache CocoaPods & DerivedData
        uses: actions/cache@v4
        with:
          path: |
            front/ios/Pods
            ~/Library/Developer/Xcode/DerivedData
          key: ios-cache-${{ runner.os }}-${{ hashFiles('front/ios/Podfile.lock') }}

      - name: Pod install
        run: cd ios && pod install

      - name: Detect simulator device
        id: sim
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | grep "iPhone" | head -n 1 | grep -o '[A-F0-9\-]\{36\}')
          echo "device_id=$DEVICE_ID" >> $GITHUB_OUTPUT
          echo "Using simulator: $DEVICE_ID"

      - name: Build iOS Simulator App
        run: |
          cd ios
          xcodebuild \
            -workspace snaplink.xcworkspace \
            -scheme snaplink \
            -configuration Debug \
            -destination "id=${{ steps.sim.outputs.device_id }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            build | xcpretty