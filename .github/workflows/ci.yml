name: CI (PR Check)

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 변경 감지
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'front/android/**'
            ios:
              - 'front/ios/**'
            src:
              - 'front/src/**'
              - 'front/package.json'
              - 'front/package-lock.json'

  # 코드 품질 검증 (Lint & Test)
  quality:
    name: Code Quality Check
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.android == 'true' || needs.changes.outputs.ios == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --passWithNoTests

  # Android 빌드 검증
  android:
    name: Android Build Check
    needs: [changes, quality]
    if: always() && (needs.quality.result == 'success' || needs.quality.result == 'skipped') && (needs.changes.outputs.android == 'true' || needs.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('front/android/**/*.gradle*', 'front/android/gradle-wrapper.properties') }}

      - name: Build Android Debug APK
        run: cd android && ./gradlew assembleDebug

  # iOS 빌드 검증
  ios:
    name: iOS Build Check
    needs: [changes, quality]
    if: always() && (needs.quality.result == 'success' || needs.quality.result == 'skipped') && (needs.changes.outputs.ios == 'true' || needs.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: macos-14
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.1.app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache CocoaPods & DerivedData
        uses: actions/cache@v4
        with:
          path: |
            front/ios/Pods
            ~/Library/Developer/Xcode/DerivedData
          key: ios-cache-${{ runner.os }}-${{ hashFiles('front/ios/Podfile.lock') }}

      - name: Pod install
        run: cd ios && pod install

      - name: Detect simulator device
        id: sim
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | grep "iPhone" | head -n 1 | grep -o '[A-F0-9\-]\{36\}')
          echo "device_id=$DEVICE_ID" >> $GITHUB_OUTPUT
          echo "Using simulator: $DEVICE_ID"

      - name: Build iOS Simulator App
        run: |
          cd ios
          xcodebuild \
            -workspace snaplink.xcworkspace \
            -scheme snaplink \
            -configuration Debug \
            -destination "id=${{ steps.sim.outputs.device_id }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            build | xcpretty