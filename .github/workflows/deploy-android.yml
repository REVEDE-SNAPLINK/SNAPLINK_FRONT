name: Android Deployment

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'front/**'
  workflow_dispatch:

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.filter.outputs.native }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            native:
              - 'front/android/**'

  deploy:
    needs: check-changes
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'front/package-lock.json'

      - name: Install npm dependencies
        working-directory: ./front
        run: npm ci

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ./front

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Secrets Setup for both Native and CodePush
      - name: Decode Android keystore
        if: needs.check-changes.outputs.native == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > front/android/app/release.keystore

      - name: Create keystore.properties
        if: needs.check-changes.outputs.native == 'true'
        working-directory: ./front/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > keystore.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.keystore
          EOF

      - name: Create Google Play service account JSON
        working-directory: ./front
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          echo "$GOOGLE_PLAY_JSON_KEY" > google-play-key.json

      - name: Grant execute permission for gradlew
        if: needs.check-changes.outputs.native == 'true'
        working-directory: ./front/android
        run: chmod +x ./gradlew

      # Native Deployment
      - name: Build and upload to Google Play Production (Main Branch)
        if: needs.check-changes.outputs.native == 'true' && github.ref == 'refs/heads/main'
        working-directory: ./front
        env:
          GOOGLE_PLAY_JSON_KEY_PATH: ./google-play-key.json
          ANDROID_PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: cd android && bundle exec --gemfile=../Gemfile fastlane deploy

      - name: Build and upload to Google Play Internal Testing (Develop Branch)
        if: needs.check-changes.outputs.native == 'true' && github.ref == 'refs/heads/develop'
        working-directory: ./front
        env:
          GOOGLE_PLAY_JSON_KEY_PATH: ./google-play-key.json
          ANDROID_PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: cd android && bundle exec --gemfile=../Gemfile fastlane beta

      # Revopush Deployment (CodePush)
      - name: Deploy via Revopush (JS Only)
        if: needs.check-changes.outputs.native != 'true'
        working-directory: ./front
        env:
          REVOPUSH_ACCESS_KEY: ${{ secrets.REVOPUSH_ACCESS_KEY }}
        run: |
          cd android && bundle exec --gemfile=../Gemfile fastlane codepush deployment:Staging

      - name: Upload build artifacts
        if: always() && needs.check-changes.outputs.native == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-build-artifacts
          path: |
            front/android/app/build/outputs/bundle/release/*.aab
            front/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f front/android/app/release.keystore
          rm -f front/android/keystore.properties
          rm -f front/google-play-key.json
