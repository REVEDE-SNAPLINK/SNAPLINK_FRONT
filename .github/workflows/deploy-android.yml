name: Android Deployment

on:
  workflow_run:
    workflows: ["CI (Build Check)"]
    types:
      - completed
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      deploy_type:
        description: 'Deployment type'
        required: true
        default: 'ota'
        type: choice
        options:
          - ota
          - promote
          - native
      target_version:
        description: 'Target binary version for OTA (e.g. 1.0.0)'
        required: false
        default: ''
      changelog:
        description: 'Changelog for this release'
        required: false
        default: 'Bug fixes and improvements'

concurrency:
  group: deploy-android-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  check-changes:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    outputs:
      native: ${{ steps.filter.outputs.native }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            native:
              - 'front/android/**'

  deploy:
    needs: check-changes
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'front/package-lock.json'

      - name: Install npm dependencies
        working-directory: ./front
        run: npm ci

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ./front

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Secrets Setup for both Native and CodePush
      - name: Decode Android keystore
        if: needs.check-changes.outputs.native == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > front/android/release.keystore

      - name: Create keystore.properties
        if: needs.check-changes.outputs.native == 'true'
        working-directory: ./front/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > keystore.properties << EOF
          SNAPLINK_RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD
          SNAPLINK_RELEASE_KEY_PASSWORD=$KEY_PASSWORD
          SNAPLINK_RELEASE_KEY_ALIAS=$KEY_ALIAS
          SNAPLINK_RELEASE_STORE_FILE=release.keystore
          EOF

      - name: Create Google Play service account JSON
        working-directory: ./front
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          echo "$GOOGLE_PLAY_JSON_KEY" > google-play-key.json

      - name: Grant execute permission for gradlew
        if: needs.check-changes.outputs.native == 'true'
        working-directory: ./front/android
        run: chmod +x ./gradlew

      # Native Deployment
      - name: Build and Deploy (Branch Specific)
        if: needs.check-changes.outputs.native == 'true'
        working-directory: ./front
        env:
          GOOGLE_PLAY_JSON_KEY_PATH: ./google-play-key.json
          ANDROID_PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          REAL_BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          echo "🚀 Detecting Branch: $REAL_BRANCH"

          if [ "$REAL_BRANCH" == "main" ]; then
            cd android && bundle exec --gemfile=../Gemfile fastlane deploy
          elif [ "$REAL_BRANCH" == "develop" ]; then
            cd android && bundle exec --gemfile=../Gemfile fastlane beta
          else
            echo "⚠️  No deployment rule for branch: $REAL_BRANCH"
          fi

      # Revopush Deployment (OTA Staging)
      - name: Deploy via Revopush (Staging)
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_type == 'ota') ||
          (github.event_name == 'workflow_run' && needs.check-changes.outputs.native != 'true')
        working-directory: ./front
        env:
          REVOPUSH_ACCESS_KEY: ${{ secrets.REVOPUSH_ACCESS_KEY }}
          TARGET_VERSION: ${{ github.event.inputs.target_version }}
        run: |
          TARGET_ARG=""
          if [ ! -z "$TARGET_VERSION" ]; then
            TARGET_ARG="target_version:$TARGET_VERSION"
          fi
          cd android && bundle exec --gemfile=../Gemfile fastlane codepush deployment:Staging $TARGET_ARG

      # Revopush Promote (Staging -> Production)
      - name: Promote Revopush to Production
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_type == 'promote'
        working-directory: ./front
        env:
          REVOPUSH_ACCESS_KEY: ${{ secrets.REVOPUSH_ACCESS_KEY }}
        run: |
          cd android && bundle exec --gemfile=../Gemfile fastlane codepush_promote from:Staging to:Production

      - name: Upload build artifacts
        if: always() && needs.check-changes.outputs.native == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-build-artifacts
          path: |
            front/android/app/build/outputs/bundle/release/*.aab
            front/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f front/android/release.keystore
          rm -f front/android/keystore.properties
          rm -f front/google-play-key.json
