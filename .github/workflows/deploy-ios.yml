name: iOS Deployment

on:
  workflow_run:
    workflows: ["CI (Build Check)"]
    types:
      - completed
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      changelog:
        description: 'Changelog for this release'
        required: false
        default: 'Bug fixes and improvements'

jobs:
  # CI 실패 시 배포 중단
  check-ci-success:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    steps:
      - run: echo "CI passed, proceeding with deployment"

  check-changes:
    needs: check-ci-success
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.filter.outputs.native }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            native:
              - 'front/ios/**'

  deploy:
    needs: check-changes
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.1.app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'front/package-lock.json'

      - name: Install npm dependencies
        working-directory: ./front
        run: npm ci

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ./front

      # Native Deployment Steps
      - name: Install CocoaPods dependencies
        if: needs.check-changes.outputs.native == 'true'
        working-directory: ./front/ios
        run: pod install

      - name: Configure Keychain
        if: needs.check-changes.outputs.native == 'true'
        env:
          CERTIFICATES_P12: ${{ secrets.IOS_CERTIFICATES_P12 }}
          CERTIFICATES_P12_PASSWORD: ${{ secrets.IOS_CERTIFICATES_P12_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo "$CERTIFICATES_P12" | base64 --decode > certificate.p12
          security import certificate.p12 -P "$CERTIFICATES_P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build and upload to TestFlight (Native)
        if: needs.check-changes.outputs.native == 'true'
        working-directory: ./front
        env:
          # App Store Connect API Key 인증
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_P8_CONTENT: ${{ secrets.APP_STORE_CONNECT_P8_BASE64 }}
          # 기존 환경 변수
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          IOS_APP_IDENTIFIER: ${{ secrets.IOS_APP_IDENTIFIER }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}
          CHANGELOG: ${{ github.event.inputs.changelog || 'Bug fixes and improvements' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: cd ios && bundle exec --gemfile=../Gemfile fastlane beta

      # Revopush Deployment (CodePush)
      - name: Deploy via Revopush (JS Only)
        if: needs.check-changes.outputs.native != 'true'
        working-directory: ./front
        env:
          REVOPUSH_ACCESS_KEY: ${{ secrets.REVOPUSH_ACCESS_KEY }}
        run: |
          cd ios && bundle exec --gemfile=../Gemfile fastlane codepush deployment:Staging

      - name: Upload build artifacts
        if: always() && needs.check-changes.outputs.native == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-artifacts
          path: |
            front/build/ios/*.ipa
            front/build/ios/*.dSYM.zip
          retention-days: 30

      - name: Clean up keychain
        if: always() && needs.check-changes.outputs.native == 'true'
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security delete-keychain $KEYCHAIN_PATH || true
