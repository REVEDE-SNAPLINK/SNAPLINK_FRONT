name: Deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deploy_type:
        description: '배포 타입'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto      # 자동 감지 (native 변경 여부 + Revopush 누적)
          - ota       # Revopush OTA 강제
          - native    # 스토어 빌드 강제
          - promote   # Revopush Staging → Production 승격
      target_version:
        description: 'OTA 타겟 바이너리 버전 (e.g. 1.0.0, 비워두면 package.json에서 자동 추출)'
        required: false
        default: ''
      platform:
        description: '배포 플랫폼'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios
      changelog:
        description: '릴리즈 변경사항'
        required: false
        default: 'Bug fixes and improvements'

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1단계: 변경 감지 + 배포 타입 결정
  # ─────────────────────────────────────────────
  detect:
    name: Detect Changes & Decide Deploy Type
    runs-on: ubuntu-latest
    outputs:
      deploy_type: ${{ steps.decide.outputs.deploy_type }}
      deployment: ${{ steps.decide.outputs.deployment }}
      has_front_changes: ${{ steps.changes.outputs.has_front_changes }}
      has_native_ios: ${{ steps.changes.outputs.has_native_ios }}
      has_native_android: ${{ steps.changes.outputs.has_native_android }}
      version_changed: ${{ steps.version_bump.outputs.changed }}
      target_version: ${{ steps.version.outputs.target_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 히스토리 필요 (git diff용)

      - name: Detect native changes (git diff)
        id: changes
        run: |
          # 이전 커밋과의 diff 확인
          if [ "${{ github.event_name }}" == "push" ]; then
            BASE_SHA="${{ github.event.before }}"
            # 첫 push인 경우 (before가 all zeros)
            if [ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]; then
              BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
            fi
          else
            # workflow_dispatch: HEAD~1과 비교
            BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi

          if [ -z "$BASE_SHA" ]; then
            echo "⚠️ Cannot determine base SHA, assuming native changes"
            echo "has_front_changes=true" >> $GITHUB_OUTPUT
            echo "has_native_ios=true" >> $GITHUB_OUTPUT
            echo "has_native_android=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "📍 Comparing $BASE_SHA..HEAD"

          # front/ 폴더 전체 변경 감지 (게이트)
          FRONT_CHANGES=$(git diff --name-only "$BASE_SHA" HEAD -- 'front/' | head -5)
          if [ -n "$FRONT_CHANGES" ]; then
            echo "📂 Changes detected in front/:"
            echo "$FRONT_CHANGES"
            echo "has_front_changes=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️ No changes in front/ directory"
            echo "has_front_changes=false" >> $GITHUB_OUTPUT
          fi

          # iOS native 변경 감지
          IOS_CHANGES=$(git diff --name-only "$BASE_SHA" HEAD -- \
            'front/ios/' \
            'front/Podfile' \
            'front/Podfile.lock' \
            | head -20)

          # Android native 변경 감지
          ANDROID_CHANGES=$(git diff --name-only "$BASE_SHA" HEAD -- \
            'front/android/' \
            | head -20)

          if [ -n "$IOS_CHANGES" ]; then
            echo "🍎 iOS native changes detected:"
            echo "$IOS_CHANGES"
            echo "has_native_ios=true" >> $GITHUB_OUTPUT
          else
            echo "🍎 No iOS native changes"
            echo "has_native_ios=false" >> $GITHUB_OUTPUT
          fi

          if [ -n "$ANDROID_CHANGES" ]; then
            echo "🤖 Android native changes detected:"
            echo "$ANDROID_CHANGES"
            echo "has_native_android=true" >> $GITHUB_OUTPUT
          else
            echo "🤖 No Android native changes"
            echo "has_native_android=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js (for Revopush CLI)
        if: github.event.inputs.deploy_type == 'auto' || github.event.inputs.deploy_type == '' || github.event_name == 'push'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check Revopush cumulative count
        id: revopush_count
        env:
          REVOPUSH_ACCESS_KEY: ${{ secrets.REVOPUSH_ACCESS_KEY }}
        run: |
          BRANCH="${{ github.ref_name }}"
          # main이면 Production, 그 외(develop)면 Staging 조회
          if [ "$BRANCH" == "main" ]; then
            DEPLOY_TARGET="Production"
          else
            DEPLOY_TARGET="Staging"
          fi
          echo "deployment=$DEPLOY_TARGET" >> $GITHUB_OUTPUT

          if [ -z "$REVOPUSH_ACCESS_KEY" ]; then
            echo "exceeded=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 해당 채널의 히스토리 조회
          HISTORY=$(npx -y @revopush/code-push-cli deployment history snaplink/ios $DEPLOY_TARGET --token "$REVOPUSH_ACCESS_KEY" 2>/dev/null) || HISTORY=""
          if [ -n "$HISTORY" ]; then
            COUNT=$(echo "$HISTORY" | grep -c "^|" || true)
            COUNT=$((COUNT > 2 ? COUNT - 2 : 0))
          else
            COUNT=0
          fi
          echo "📊 Revopush ($DEPLOY_TARGET) count: $COUNT"
          [ "$COUNT" -ge 10 ] && echo "exceeded=true" >> $GITHUB_OUTPUT || echo "exceeded=false" >> $GITHUB_OUTPUT

      - name: Detect version bump
        id: version_bump
        run: |
          # 이전 커밋의 package.json 버전 추출
          PREV_VERSION=$(git show HEAD~1:front/package.json 2>/dev/null | node -e "const data = require('fs').readFileSync(0, 'utf-8'); try { console.log(JSON.parse(data).version || '0.0.0'); } catch(e) { console.log('0.0.0'); }" || echo "0.0.0")
          CURR_VERSION=$(node -p "require('./front/package.json').version")
          
          echo "prev=$PREV_VERSION" >> $GITHUB_OUTPUT
          echo "curr=$CURR_VERSION" >> $GITHUB_OUTPUT

          if [ "$PREV_VERSION" != "$CURR_VERSION" ] && [ "$PREV_VERSION" != "0.0.0" ]; then
            echo "📈 Version bumped: $PREV_VERSION -> $CURR_VERSION"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./front/package.json').version")
          echo "📦 Package version: $VERSION"
          
          # workflow_dispatch에서 target_version이 지정된 경우 그것을 사용
          if [ -n "${{ github.event.inputs.target_version }}" ]; then
            echo "target_version=${{ github.event.inputs.target_version }}" >> $GITHUB_OUTPUT
          else
            echo "target_version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Decide deploy type
        id: decide
        run: |
          BRANCH="${{ github.ref_name }}"
          DEPLOYMENT="${{ steps.revopush_count.outputs.deployment }}"
          REVOPUSH_EXCEEDED="${{ steps.revopush_count.outputs.exceeded }}"
          VERSION_CHANGED="${{ steps.version_bump.outputs.changed }}"
          HAS_NATIVE_IOS="${{ steps.changes.outputs.has_native_ios }}"
          HAS_NATIVE_ANDROID="${{ steps.changes.outputs.has_native_android }}"

          echo "deployment=$DEPLOYMENT" >> $GITHUB_OUTPUT

          # 수동 실행 처리
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ github.event.inputs.deploy_type }}" != "auto" ]; then
            echo "deploy_type=${{ github.event.inputs.deploy_type }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 자동 결정 로직
          if [ "$BRANCH" == "develop" ]; then
            # develop은 카운트 상관없이 네이티브 수정 있으면 native, 아니면 ota
            if [ "$VERSION_CHANGED" == "true" ] || [ "$HAS_NATIVE_IOS" == "true" ] || [ "$HAS_NATIVE_ANDROID" == "true" ]; then
              echo "deploy_type=native" >> $GITHUB_OUTPUT
            else
              echo "deploy_type=ota" >> $GITHUB_OUTPUT
            fi
          else
            # main(운영)은 네이티브 수정 OR 카운트 10회 초과 시 native
            if [ "$VERSION_CHANGED" == "true" ] || [ "$HAS_NATIVE_IOS" == "true" ] || [ "$HAS_NATIVE_ANDROID" == "true" ] || [ "$REVOPUSH_EXCEEDED" == "true" ]; then
              echo "deploy_type=native" >> $GITHUB_OUTPUT
            else
              echo "deploy_type=ota" >> $GITHUB_OUTPUT
            fi
          fi

  # ─────────────────────────────────────────────
  # 2단계: 코드 품질 검증
  # ─────────────────────────────────────────────
  quality:
    name: Code Quality Check
    needs: detect
    if: needs.detect.outputs.deploy_type != 'promote' && needs.detect.outputs.deploy_type != 'skip'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --passWithNoTests

  # ─────────────────────────────────────────────
  # 3단계: iOS 배포
  # ─────────────────────────────────────────────
  deploy-ios:
    name: iOS Deploy (${{ needs.detect.outputs.deploy_type }})
    needs: [detect, quality]
    if: always() && needs.detect.outputs.deploy_type != 'skip' && (needs.quality.result == 'success' || needs.detect.outputs.deploy_type == 'promote') && (github.event.inputs.platform == '' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios')
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        if: needs.detect.outputs.deploy_type == 'native'
        run: sudo xcode-select -switch /Applications/Xcode_26.3.app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Update Open Source Licenses
        run: npm run licenses

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ./front

      # ── Native Build (TestFlight) ──
      - name: Install CocoaPods
        if: needs.detect.outputs.deploy_type == 'native'
        working-directory: ./front/ios
        run: pod install

      - name: Configure Keychain
        if: needs.detect.outputs.deploy_type == 'native'
        env:
          CERTIFICATES_P12: ${{ secrets.IOS_CERTIFICATES_P12 }}
          CERTIFICATES_P12_PASSWORD: ${{ secrets.IOS_CERTIFICATES_P12_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo "$CERTIFICATES_P12" | base64 --decode > certificate.p12
          security import certificate.p12 -P "$CERTIFICATES_P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"

          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/profile.plist")

          echo "✅ Profile: $PROFILE_NAME (UUID: $PROFILE_UUID)"
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision

      - name: Build and upload to TestFlight
        if: needs.detect.outputs.deploy_type == 'native'
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_P8_CONTENT: ${{ secrets.APP_STORE_CONNECT_P8_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          IOS_APP_IDENTIFIER: ${{ secrets.IOS_APP_IDENTIFIER }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}
          CHANGELOG: ${{ github.event.inputs.changelog || 'Bug fixes and improvements' }}
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "🚀 Branch: $BRANCH"

          if [ "$BRANCH" == "main" ]; then
            cd ios && bundle exec --gemfile=../Gemfile fastlane release
          elif [ "$BRANCH" == "develop" ]; then
            cd ios && bundle exec --gemfile=../Gemfile fastlane beta
          else
            echo "⚠️ No deployment rule for branch: $BRANCH"
          fi

      # ── Revopush OTA (iOS) ──
      - name: Setup Revopush CLI
        if: needs.detect.outputs.deploy_type == 'ota' || needs.detect.outputs.deploy_type == 'promote'
        uses: 'revopush/revopush-github-action@v1'
        with:
          version: 'latest'
          accessKey: ${{ secrets.REVOPUSH_ACCESS_KEY }}

      - name: Deploy via Revopush
        if: needs.detect.outputs.deploy_type == 'ota'
        run: |
          DEPLOYMENT="${{ needs.detect.outputs.deployment }}"
          TARGET_VERSION="${{ needs.detect.outputs.target_version }}"
          # Fastlane 없이 직접 실행 (front 폴더 기준)
          revopush release-react snaplink ios -d $DEPLOYMENT -t $TARGET_VERSION

      - name: Promote Revopush
        if: needs.detect.outputs.deploy_type == 'promote'
        run: revopush promote snaplink ios Staging Production

      # ── Cleanup ──
      - name: Upload build artifacts
        if: always() && needs.detect.outputs.deploy_type == 'native'
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-artifacts
          path: |
            front/build/ios/*.ipa
            front/build/ios/*.dSYM.zip
          retention-days: 30

      - name: Clean up keychain
        if: always() && needs.detect.outputs.deploy_type == 'native'
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security delete-keychain $KEYCHAIN_PATH || true

  # ─────────────────────────────────────────────
  # 4단계: Android 배포
  # ─────────────────────────────────────────────
  deploy-android:
    name: Android Deploy (${{ needs.detect.outputs.deploy_type }})
    needs: [detect, quality]
    if: always() && needs.detect.outputs.deploy_type != 'skip' && (needs.quality.result == 'success' || needs.detect.outputs.deploy_type == 'promote') && (github.event.inputs.platform == '' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Update Open Source Licenses
        run: npm run licenses

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ./front

      - name: Setup Java
        if: needs.detect.outputs.deploy_type == 'native'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        if: needs.detect.outputs.deploy_type == 'native'
        uses: android-actions/setup-android@v3

      # ── Native Build Secrets ──
      - name: Decode Android keystore
        if: needs.detect.outputs.deploy_type == 'native'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release.keystore

      - name: Create keystore.properties
        if: needs.detect.outputs.deploy_type == 'native'
        working-directory: ./front/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > keystore.properties << EOF
          SNAPLINK_RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD
          SNAPLINK_RELEASE_KEY_PASSWORD=$KEY_PASSWORD
          SNAPLINK_RELEASE_KEY_ALIAS=$KEY_ALIAS
          SNAPLINK_RELEASE_STORE_FILE=../release.keystore
          EOF

      - name: Grant execute permission for gradlew
        if: needs.detect.outputs.deploy_type == 'native'
        working-directory: ./front/android
        run: chmod +x ./gradlew

      # ── Native Build & Deploy ──
      - name: Build and Deploy to Play Store
        if: needs.detect.outputs.deploy_type == 'native'
        env:
          SUPPLY_JSON_KEY_DATA: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
          ANDROID_PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "🚀 Branch: $BRANCH"

          if [ "$BRANCH" == "main" ]; then
            cd android && bundle exec --gemfile=../Gemfile fastlane deploy
          elif [ "$BRANCH" == "develop" ]; then
            cd android && bundle exec --gemfile=../Gemfile fastlane beta
          else
            echo "⚠️ No deployment rule for branch: $BRANCH"
          fi

      # ── Revopush OTA (Android) ──
      - name: Setup Revopush CLI
        if: needs.detect.outputs.deploy_type == 'ota' || needs.detect.outputs.deploy_type == 'promote'
        uses: 'revopush/revopush-github-action@v1'
        with:
          version: 'latest'
          accessKey: ${{ secrets.REVOPUSH_ACCESS_KEY }}

      - name: Deploy via Revopush
        if: needs.detect.outputs.deploy_type == 'ota'
        run: |
          DEPLOYMENT="${{ needs.detect.outputs.deployment }}"
          TARGET_VERSION="${{ needs.detect.outputs.target_version }}"
          # Fastlane 없이 직접 실행 (front 폴더 기준)
          revopush release-react snaplink android -d $DEPLOYMENT -t $TARGET_VERSION

      - name: Promote Revopush
        if: needs.detect.outputs.deploy_type == 'promote'
        run: revopush promote snaplink android Staging Production

      # ── Cleanup ──
      - name: Upload build artifacts
        if: always() && needs.detect.outputs.deploy_type == 'native'
        uses: actions/upload-artifact@v4
        with:
          name: android-build-artifacts
          path: |
            front/android/app/build/outputs/bundle/release/*.aab
            front/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f android/release.keystore
          rm -f android/keystore.properties
