name: Sync Labels

on:
  push:
    paths:
      - '.github/labels.yml'
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  sync:
    runs-on: self-hosted
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync GitHub labels
        uses: crazy-max/ghaction-github-labeler@v5.3.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          yaml-file: .github/labels.yml
          skip-delete: false