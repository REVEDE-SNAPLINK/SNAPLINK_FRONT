name: Android Play Store Deployment

# DISABLED: Uncomment the 'on' section below to enable this workflow
# on:
#   push:
#     branches:
#       - main
#       - develop
#   workflow_dispatch:

# Temporarily disabled - remove this and uncomment 'on' section above to enable
on:
  workflow_dispatch:
    inputs:
      enable_workflow:
        description: 'This workflow is currently disabled. Enable it by editing the workflow file.'
        required: false

jobs:
  deploy_android:
    name: Deploy Android to Play Store
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode and create keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Create keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/keystore.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.keystore
          EOF

      - name: Create Google Play Service Account JSON
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: |
          echo "$PLAY_STORE_JSON_KEY" > android/play-store-credentials.json

      - name: Build and Deploy to Play Store Internal Testing
        env:
          PLAY_STORE_JSON_KEY: ${{ github.workspace }}/android/play-store-credentials.json
        run: |
          cd android
          bundle exec fastlane beta

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f android/app/release.keystore
          rm -f android/keystore.properties
          rm -f android/play-store-credentials.json

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs
          path: |
            android/fastlane/report.xml
            android/fastlane/logs
            android/app/build/outputs
