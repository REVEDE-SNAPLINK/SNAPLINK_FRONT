pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") }

// local.properties에서 node 경로 읽기
def localPropertiesFile = new File(settingsDir, "local.properties")
def localProperties = new Properties()
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { stream -> localProperties.load(stream) }
}
def nodeDir = localProperties.getProperty("node.dir")
println "Loaded node.dir from local.properties: $nodeDir"
def nodeExecutable = nodeDir ? "${nodeDir}/node" : "node"
def npxExecutable = nodeDir ? "${nodeDir}/npx" : "npx"
println "Resolved nodeExecutable: $nodeExecutable"

extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> 
    ex.autolinkLibrariesFromCommand([npxExecutable, "@react-native-community/cli", "config"]) 
}

rootProject.name = 'snaplink'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')

dependencyResolutionManagement {
//   repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
  repositories {
    google()
    mavenCentral()
    maven { url 'https://devrepo.kakao.com/nexus/content/groups/public/' }
    maven { url 'https://www.jitpack.io' }
    maven { url "$rootDir/../node_modules/@notifee/react-native/android/libs" }
  }
}

apply from: new File([nodeExecutable, "--print", "require.resolve('expo/package.json')"].execute(null, rootDir).text.trim(), "../scripts/autolinking.gradle")
useExpoModules()
